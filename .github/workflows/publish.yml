name: Publish

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  publish:
    name: Publish to npm & JSR
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write      # needed for changesets to push version commits
      pull-requests: write # needed for changesets to create Version PRs
      id-token: write      # needed for JSR OIDC authentication

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history needed by changesets

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        # version is read from packageManager in package.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      # Creates a "Version Packages" PR when changesets are pending,
      # or publishes to npm when that PR is merged.
      - name: Create Release PR or Publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          publish: node scripts/fix-workspace-deps.js && pnpm changeset publish
          commit: "chore: release packages"
          title: "chore: release packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Restore workspace:* deps after npm publish to keep local dev working
      - name: Restore workspace dependencies
        if: steps.changesets.outputs.published == 'true'
        run: git restore packages/*/package.json

      # Publish to JSR — runs on every push to main, independent of npm publish.
      # Only packages with a jsr.json are published. JSR handles version deduplication.
      - name: Publish to JSR
        run: |
          published=0
          for dir in packages/*/; do
            if [ -f "${dir}jsr.json" ]; then
              echo "→ Publishing ${dir} to JSR"
              (cd "$dir" && npx jsr publish --allow-dirty) && published=$((published + 1))
            fi
          done
          if [ $published -eq 0 ]; then
            echo "No packages with jsr.json found — skipping JSR publish"
          fi
